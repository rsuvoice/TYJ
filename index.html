<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Youth Jazz (TYJ) - โครงการส่งเสริมเยาวชนด้านดนตรี</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* สไตล์พื้นฐาน */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Kanit', sans-serif;
            overflow-x: hidden; 
            color: #333333;
        }

        /* 1. แถบ Navigation ด้านบน (กำหนดความสูงให้เป๊ะเพื่อคำนวณลายเส้น) */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 85px; /* กำหนดความสูงของแถบเมนูไว้ที่ 85px */
            padding: 0 40px;
            display: flex;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .logo-area img {
            height: 55px;
            display: block;
        }

        .header-links {
            margin-left: 50px;
            display: flex;
            gap: 30px;
        }
        .header-links a {
            text-decoration: none;
            color: #444444;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .header-links a:hover {
            color: #0076BE;
        }

        /* 2. พื้นที่ตรงกลางทั้งหมด */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            text-align: center;
            padding: 100px 20px 40px 20px; /* เผื่อระยะแถบเมนูด้านบน */
            box-sizing: border-box;
            position: relative;
            z-index: 10; 
        }

        /* Artwork กราฟิก (ขยายให้ใหญ่ขึ้นมาก เพื่อลดช่องว่าง) */
        .artwork-image {
            height: auto;
            max-width: 800px; /* ขยายจาก 480px เป็น 800px ให้เด่นเต็มตา */
            width: 100%;
            margin-bottom: 20px;
            animation: floatBobbing 5s ease-in-out infinite;
            filter: drop-shadow(0px 15px 25px rgba(0,0,0,0.08)); 
        }

        @keyframes floatBobbing {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); } /* ให้ลอยขึ้นเยอะกว่าเดิมนิดนึงให้สมดุลกับขนาด */
            100% { transform: translateY(0px); }
        }

        /* ข้อความจากรูปภาพ (Artwork Text) */
        .artwork-text {
            height: auto;
            max-width: 650px; /* ขยายข้อความให้ใหญ่ตามรูปภาพด้านบน */
            width: 100%;
            margin-top: 10px;
            filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.03));
        }

        /* 3 & 4. ลายเส้นซ้าย-ขวา (ปรับให้ชนบน-ล่าง) */
        .bg-line-art {
            position: fixed;
            top: 85px; /* เริ่มต้นที่ใต้ขอบแถบเมนูด้านบนพอดี (ชนขอบ) */
            height: calc(100vh - 85px); /* ลากยาวลงมาจนสุดขอบจอด้านล่างพอดี (ชนขอบ) */
            z-index: 1; 
            pointer-events: none; 
            opacity: 0.95;
            object-fit: contain; /* ป้องกันไม่ให้รูปลายเส้นถูกบีบหรือยืดเสียทรง */
        }
        
        .bg-clef {
            left: -10px; /* ดึงเข้าขอบซ้ายนิดหน่อยให้ดูเป็นธรรมชาติ */
        }
        
        .bg-sax {
            right: -10px; /* ดึงเข้าขอบขวานิดหน่อยให้ดูเป็นธรรมชาติ */
        }

        /* สำหรับหน้าจอมือถือ (ปรับให้เหมาะสมไม่ล้นจอ) */
        @media (max-width: 768px) {
            .top-bar { height: 70px; padding: 0 20px; }
            .logo-area img { height: 40px; }
            .header-links { display: none; }
            
            .hero-section { padding-top: 80px; }
            .artwork-image { max-width: 85%; }
            .artwork-text { max-width: 80%; }
            
            .bg-line-art { top: 70px; height: calc(100vh - 70px); opacity: 0.3; } /* จางลงในมือถือเพื่อให้อ่านง่าย */
            .bg-clef { left: -30px; }
            .bg-sax { right: -30px; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-area">
            <img src="https://drive.google.com/thumbnail?id=1wTTTIOdEpVF6QKqIOe4IF6bc9ovlCikv&sz=w1000" alt="TYJ Logo">
        </div>
        <nav class="header-links">
            <a href="#">หน้าแรก</a>
            <a href="#">ตารางกิจกรรม</a>
            <a href="#">รายชื่อศิลปิน</a>
            <a href="#">ติดต่อเรา</a>
        </nav>
    </header>

    <main class="hero-section">
        
        <img src="https://drive.google.com/thumbnail?id=1PywfABYVYRgwqHpP6hIFKrtfWoeYxLcd&sz=w1000" alt="Thai Youth Jazz Artwork" class="artwork-image">

        <img src="https://drive.google.com/thumbnail?id=1CHSf4m6TiUQJs4zukSYYROwdpqSf8xjD&sz=w1000" alt="Thai Youth Jazz Text" class="artwork-text">

    </main>

    <img src="https://drive.google.com/thumbnail?id=1UJ0aNHLuGpgSgx3OQcIKAVXz1Y7M_PBC&sz=w1000" alt="Clef Line Art" class="bg-line-art bg-clef">

    <img src="https://drive.google.com/thumbnail?id=1HvU6mYUNvLenvdMTdiQPzN2zeuZV2j2e&sz=w1000" alt="Saxophone Line Art" class="bg-line-art bg-sax">

</body>
</html>
