<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Youth Jazz (TYJ) - โครงการส่งเสริมเยาวชนด้านดนตรี</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* สไตล์พื้นฐาน: ขาวสะอาดตา */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* พื้นหลังสีขาวล้วน */
            font-family: 'Kanit', sans-serif;
            overflow-x: hidden; 
            color: #333333;
        }

        /* 1. แถบ Navigation ด้านบน */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            border-bottom: 1px solid rgba(0,0,0,0.03); /* เส้นคั่นบางๆ ให้ดูมีมิติ */
        }
        
        /* โลโก้ */
        .logo-area img {
            height: 55px;
            display: block;
        }

        /* เมนู Link ข้าง Logo */
        .header-links {
            margin-left: 50px;
            display: flex;
            gap: 30px;
        }
        .header-links a {
            text-decoration: none;
            color: #444444;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .header-links a:hover {
            color: #0076BE;
        }

        /* 2. พื้นที่ตรงกลางทั้งหมด */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            text-align: center;
            padding: 100px 20px 40px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 10; /* ให้อยู่เหนือลายเส้น */
        }

        /* Artwork กราฟิก (มี Effect ลอย) */
        .artwork-image {
            height: auto;
            max-width: 480px; /* ปรับขนาดกราฟิกให้พอดี */
            width: 100%;
            margin-bottom: 15px;
            animation: floatBobbing 5s ease-in-out infinite;
            filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.06)); /* เพิ่มเงาบางๆ ให้รูปลอยชัดขึ้น */
        }

        /* คีย์เฟรมสำหรับให้กราฟิกลอยขึ้น-ลง */
        @keyframes floatBobbing {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); } 
            100% { transform: translateY(0px); }
        }

        /* ข้อความจากรูปภาพ (Artwork Text) */
        .artwork-text {
            height: auto;
            max-width: 420px; /* ขนาดของกลุ่มข้อความ */
            width: 100%;
            margin-top: 10px;
        }

        /* 3 & 4. ลายเส้นซ้าย-ขวา */
        .bg-line-art {
            position: fixed;
            bottom: -20px; /* ดึงลงมาติดขอบล่างนิดหน่อย */
            height: 65vh; /* ขนาดของลายเส้น */
            z-index: 1; /* ให้อยู่หลัง Content */
            pointer-events: none; /* ป้องกันการเผลอคลิกโดน */
            opacity: 0.9;
        }
        .bg-clef {
            left: -20px; /* ชิดขอบซ้าย */
        }
        .bg-sax {
            right: -20px; /* ชิดขอบขวา */
        }

        /* จัดการหน้าจอสำหรับมือถือ */
        @media (max-width: 768px) {
            .top-bar { padding: 15px 20px; }
            .logo-area img { height: 45px; }
            .header-links { display: none; } /* ซ่อนเมนูลิงก์บนมือถือชั่วคราว */
            .artwork-image { max-width: 80%; }
            .artwork-text { max-width: 75%; }
            .bg-line-art { height: 40vh; opacity: 0.4; } /* ให้ลายเส้นบนมือถือจางลงจะได้ไม่กวนรูปหลัก */
            .bg-clef { left: -40px; }
            .bg-sax { right: -40px; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-area">
            <img src="https://drive.google.com/thumbnail?id=1wTTTIOdEpVF6QKqIOe4IF6bc9ovlCikv&sz=w1000" alt="TYJ Logo">
        </div>
        <nav class="header-links">
            <a href="#">หน้าแรก</a>
            <a href="#">ตารางกิจกรรม</a>
            <a href="#">รายชื่อศิลปิน</a>
            <a href="#">ติดต่อเรา</a>
        </nav>
    </header>

    <main class="hero-section">
        
        <img src="https://drive.google.com/thumbnail?id=1PywfABYVYRgwqHpP6hIFKrtfWoeYxLcd&sz=w1000" alt="Thai Youth Jazz Artwork" class="artwork-image">

        <img src="https://drive.google.com/thumbnail?id=1CHSf4m6TiUQJs4zukSYYROwdpqSf8xjD&sz=w1000" alt="Thai Youth Jazz Text" class="artwork-text">

    </main>

    <img src="https://drive.google.com/thumbnail?id=1UJ0aNHLuGpgSgx3OQcIKAVXz1Y7M_PBC&sz=w1000" alt="Clef Line Art" class="bg-line-art bg-clef">

    <img src="https://drive.google.com/thumbnail?id=1HvU6mYUNvLenvdMTdiQPzN2zeuZV2j2e&sz=w1000" alt="Saxophone Line Art" class="bg-line-art bg-sax">

</body>
</html>
