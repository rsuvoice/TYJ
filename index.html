<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Youth Jazz | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #FDFBF7;
            margin: 0;
            overflow-x: hidden;
        }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }

        /* พื้นหลังที่เป็น Artwork */
        .bg-artwork {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://drive.google.com/thumbnail?id=1QnXTVXuiiGDdvVwrYpQNS3mTen8Zp78W&sz=w1000');
            background-size: cover;
            background-position: center;
            opacity: 0.15; /* ปรับความเข้มจางของพื้นหลังที่นี่ */
            filter: blur(5px); /* เพิ่มความเบลอเล็กน้อยเพื่อให้ตัวหนังสือเด่น */
            z-index: -1;
        }

        .jazz-gradient {
            background: linear-gradient(135deg, #0076BE 0%, #3AB5E5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="text-slate-900">

    <div class="bg-artwork"></div>

    <nav class="flex justify-between items-center px-6 md:px-12 py-8 max-w-7xl mx-auto relative z-10">
        <img src="https://drive.google.com/thumbnail?id=1-s-RY3BlkvRESeHHcH9fa3EjJb4NsbJO&sz=w1000" alt="TYJ Logo" class="h-12 md:h-16">
        <button class="font-montserrat font-extrabold text-sm bg-[#0076BE] text-white px-8 py-3 rounded-full hover:shadow-2xl transition duration-300">
            TICKETS
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 md:px-12 pt-10 pb-24 relative z-10">
        <div class="flex flex-col md:flex-row items-center gap-12">
            
            <div class="md:w-1/2 text-center md:text-left">
                <h2 class="font-montserrat font-extrabold text-[#0076BE] tracking-[0.3em] text-xs mb-4 uppercase">Youth Music Movement</h2>
                <h1 class="font-montserrat font-extrabold text-6xl md:text-8xl leading-none mb-8">
                    THAI <br> <span class="jazz-gradient">YOUTH</span> <br> JAZZ
                </h1>
                <p class="text-slate-600 text-lg md:text-xl max-w-md mb-10 font-light">
                    เมื่อศิลปะและดนตรีแจ๊สโคจรมาพบกัน ในพื้นที่สร้างสรรค์ของเยาวชนรุ่นใหม่
                </p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start font-montserrat">
                    <a href="#" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-extrabold hover:bg-[#0076BE] transition shadow-xl text-center">
                        SEE PROGRAM
                    </a>
                </div>
            </div>

            <div class="md:w-1/2">
                <div class="glass-card p-4 rounded-3xl shadow-2xl rotate-2 hover:rotate-0 transition duration-500">
                    <img src="https://drive.google.com/thumbnail?id=1QnXTVXuiiGDdvVwrYpQNS3mTen8Zp78W&sz=w1000" 
                         alt="Main Poster" 
                         class="rounded-2xl w-full h-auto shadow-inner">
                </div>
            </div>

        </div>
    </main>

    <footer class="text-center py-12 relative z-10">
        <p class="font-montserrat font-extrabold text-[10px] tracking-[0.5em] text-slate-400">© 2024 THAI YOUTH JAZZ</p>
    </footer>

</body>
</html>
