<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Youth Jazz | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tyj-blue: #0076BE;
            --tyj-light-blue: #3AB5E5;
        }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #FDFBF7; 
        }
        .font-montserrat { 
            font-family: 'Montserrat', sans-serif; 
        }
        .jazz-gradient {
            background: linear-gradient(135deg, var(--tyj-blue) 0%, var(--tyj-light-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-title {
            font-size: clamp(3.5rem, 10vw, 7rem);
            line-height: 0.9;
            letter-spacing: -0.02em;
        }
        .poster-card {
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .poster-card:hover {
            transform: translateY(-10px) rotate(0deg) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body class="text-slate-900">

    <nav class="flex justify-between items-center px-6 md:px-12 py-8 max-w-7xl mx-auto">
        <img src="https://drive.google.com/thumbnail?id=1-s-RY3BlkvRESeHHcH9fa3EjJb4NsbJO&sz=w1000" alt="TYJ Logo" class="h-12 md:h-14">
        
        <div class="hidden md:flex gap-10 font-montserrat font-extrabold text-[13px] tracking-widest text-slate-400">
            <a href="#" class="hover:text-slate-900 transition">PROGRAM</a>
            <a href="#" class="hover:text-slate-900 transition">ARTISTS</a>
            <a href="#" class="hover:text-slate-900 transition">GALLERY</a>
        </div>

        <button class="font-montserrat font-extrabold text-sm bg-slate-900 text-white px-8 py-3 rounded-full hover:bg-[#0076BE] transition duration-300 shadow-xl">
            TICKETS
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 md:px-12 pt-10 pb-24 flex flex-col md:flex-row items-center gap-16">
        
        <div class="md:w-3/5 text-center md:text-left">
            <p class="font-montserrat font-extrabold text-[#0076BE] tracking-[0.4em] text-sm mb-6 uppercase">
                Youth Energy & Contemporary Jazz
            </p>
            <h1 class="font-montserrat font-extrabold hero-title mb-8">
                THAI <br> 
                <span class="jazz-gradient">YOUTH</span> <br> 
                JAZZ
            </h1>
            <p class="text-slate-500 text-lg md:text-xl max-w-lg leading-relaxed mb-10 font-light">
                เทศกาลดนตรีแจ๊สที่รวมตัวเหล่าเยาวชนคนดนตรี <br class="hidden md:block"> 
                มาปลดปล่อยไอเดียและสร้างสรรค์ท่วงทำนองใหม่ไปพร้อมกัน
            </p>
            
            <div class="flex flex-wrap justify-center md:justify-start gap-5">
                <a href="#" class="font-montserrat font-extrabold bg-slate-900 text-white px-10 py-5 rounded-2xl hover:bg-[#0076BE] transition shadow-2xl flex items-center gap-3">
                    EXPLORE SHOWS
                </a>
            </div>
        </div>

        <div class="md:w-2/5 relative">
            <div class="absolute -inset-4 bg-gradient-to-tr from-[#0076BE] to-yellow-400 opacity-20 blur-2xl rounded-full"></div>
            
            <div class="relative poster-card bg-white p-3 rounded-lg transform -rotate-3">
                <img src="https://drive.google.com/thumbnail?id=1QnXTVXuiiGDdvVwrYpQNS3mTen8Zp78W&sz=w1000" 
                     alt="Thai Youth Jazz Poster" 
                     class="w-full h-auto rounded shadow-sm">
            </div>
            
            <div class="absolute -bottom-6 -right-6 md:right-0 bg-yellow-400 font-montserrat font-extrabold px-6 py-4 rounded-xl shadow-lg transform rotate-6">
                FESTIVAL 2024
            </div>
        </div>

    </main>

    <footer class="max-w-7xl mx-auto px-6 py-10 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6">
        <p class="font-montserrat font-extrabold text-[11px] tracking-widest text-slate-300">© 2024 THAI YOUTH JAZZ COMMUNITY</p>
        <div class="flex gap-8 font-montserrat font-extrabold text-[12px] tracking-tighter">
            <a href="#" class="text-slate-400 hover:text-pink-500 transition">INSTAGRAM</a>
            <a href="#" class="text-slate-400 hover:text-blue-600 transition">FACEBOOK</a>
            <a href="#" class="text-slate-400 hover:text-black transition">TIKTOK</a>
        </div>
    </footer>

</body>
</html>
