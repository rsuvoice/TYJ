<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Youth Jazz | Official Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Kanit', sans-serif;
            background-color: #000;
            overflow-x: hidden;
        }

        .font-montserrat { font-family: 'Montserrat', sans-serif; }

        /* Container สำหรับ Video Background - เต็มหน้าจอและอยู่ Layer ล่างสุด */
        .video-docker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .video-docker video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #000;
        }

        /* Overlay ที่ซอฟต์มาก - เพื่อให้เห็นวิดีโอชัดเจนขึ้น แต่ตัวหนังสือยังอ่านได้ */
        .video-overlay-soft {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2); /* ปรับความเข้มจางได้ที่นี่ (0.2 = จางมาก) */
            z-index: -1;
        }

        /* Nav Strip กึ่งโปร่งใส (เหมือนเดิม) */
        .nav-strip {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* เทคนิค Drop Shadow ที่ทำให้ตัวหนังสือสีขาวลอยเด่นขึ้นจากวิดีโอ */
        .text-pop-out {
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.7); /* เพิ่มเงาเข้มหลังตัวอักษร */
        }

        .cta-button {
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 118, 190, 0.4);
            background-color: #3AB5E5;
            color: white;
        }
    </style>
</head>
<body class="text-white">

    <div class="video-docker">
        <video autoplay muted loop playsinline>
            <source src="https://drive.google.com/uc?export=download&id=1DbhPrNXIHQY-aVfa4JCX3p_92SS9bWdo" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div class="video-overlay-soft"></div>

    <header class="nav-strip sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <img src="https://drive.google.com/thumbnail?id=1-s-RY3BlkvRESeHHcH9fa3EjJb4NsbJO&sz=w1000" alt="TYJ Logo" class="h-10 md:h-12 brightness-0 invert">
            
            <div class="hidden md:flex gap-8 font-montserrat font-extrabold text-[12px] tracking-widest text-white/80">
                <a href="#" class="hover:text-white transition">PROGRAM</a>
                <a href="#" class="hover:text-white transition">ARTISTS</a>
                <a href="#" class="hover:text-white transition">ABOUT</a>
            </div>

            <button class="font-montserrat font-extrabold text-xs bg-white text-slate-900 px-6 py-2.5 rounded-full cta-button">
                TICKETS
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 min-h-[85vh] flex items-center justify-center text-center relative z-10">
        <div class="max-w-3xl">
            <p class="font-montserrat font-extrabold text-[#3AB5E5] tracking-[0.4em] text-sm mb-6 uppercase text-pop-out">
                Youth Energy & Sound
            </p>
            <h1 class="font-montserrat font-extrabold text-4xl md:text-7xl mb-8 leading-tight tracking-tighter text-pop-out">
                THAI YOUTH JAZZ <br> EXPERIENCE
            </h1>
            <p class="text-white text-lg md:text-xl mb-14 font-light leading-relaxed text-pop-out">
                สัมผัสพลังดนตรีจากเยาวชนทั่วไทย <br class="hidden md:block"> 
                ในรูปแบบที่คุณไม่เคยเห็นมาก่อน
            </p>
            
            <div class="flex flex-col sm:flex-row gap-5 justify-center font-montserrat relative z-10">
                <a href="#" class="bg-white text-slate-900 px-10 py-4 rounded-2xl font-extrabold cta-button text-center">
                    EXPLORE SHOWS
                </a>
                <a href="#" class="border-2 border-white/40 bg-white/5 text-white px-10 py-4 rounded-2xl font-extrabold hover:bg-white/10 transition text-center">
                    รู้จักกับเรา
                </a>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center relative z-10">
        <p class="font-montserrat font-extrabold text-[10px] tracking-[0.5em] text-white/50 text-pop-out">© 2024 THAI YOUTH JAZZ COMMUNITY</p>
    </footer>

</body>
</html>
