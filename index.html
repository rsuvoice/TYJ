<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Youth Jazz (TYJ) - โครงการส่งเสริมเยาวชนด้านดนตรี</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* สไตล์พื้นฐาน */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Kanit', sans-serif;
            overflow-x: hidden; 
            color: #333333;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* เพื่อให้ Footer อยู่ล่างสุดเสมอ */
        }

        /* 1. แถบ Navigation ด้านบน */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 85px; 
            padding: 0 40px;
            display: flex;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .logo-area img {
            height: 55px;
            display: block;
        }

        .header-links {
            margin-left: 50px;
            display: flex;
            gap: 30px;
        }
        .header-links a {
            text-decoration: none;
            color: #444444;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .header-links a:hover {
            color: #0076BE;
        }

        /* 2. พื้นที่ตรงกลางทั้งหมด */
        .hero-section {
            flex: 1; /* ให้ส่วนนี้ขยายเต็มพื้นที่ตรงกลาง */
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            text-align: center;
            padding: 100px 20px 20px 20px; 
            box-sizing: border-box;
            position: relative;
            z-index: 10; 
        }

        /* Artwork กราฟิก */
        .artwork-image {
            height: auto;
            max-width: 750px; 
            width: 100%;
            margin-bottom: 0px; 
            animation: floatBobbing 5s ease-in-out infinite;
            filter: drop-shadow(0px 15px 25px rgba(0,0,0,0.08)); 
        }

        @keyframes floatBobbing {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* กล่องใส่วิดีโอ YouTube */
        .video-wrapper {
            width: 100%;
            max-width: 600px; 
            aspect-ratio: 16 / 9;
            margin-bottom: 5px; 
            margin-top: 0px;
            border-radius: 20px; 
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
            background-color: #000;
        }
        
        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ข้อความจากรูปภาพ (Artwork Text) */
        .artwork-text {
            height: auto;
            max-width: 650px; 
            width: 100%;
            margin-top: 0px; 
            filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.03));
        }

        /* 3 & 4. ลายเส้นซ้าย-ขวา */
        .bg-line-art {
            position: fixed;
            top: 85px; 
            height: calc(100vh - 85px); 
            z-index: 1; 
            pointer-events: none; 
            opacity: 0.95;
            object-fit: contain; 
        }
        
        .bg-clef { left: -10px; }
        .bg-sax { right: -10px; }

        /* 5. Footer (Copyright) */
        .site-footer {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            font-size: 13px;
            color: #999999;
            z-index: 10;
            position: relative;
            letter-spacing: 0.5px;
        }

        /* สำหรับหน้าจอมือถือ */
        @media (max-width: 768px) {
            .top-bar { height: 70px; padding: 0 20px; }
            .logo-area img { height: 40px; }
            .header-links { display: none; }
            
            .hero-section { padding-top: 90px; }
            .artwork-image { max-width: 85%; margin-bottom: 0px;}
            .video-wrapper { max-width: 90%; margin-bottom: 5px; border-radius: 12px; }
            .artwork-text { max-width: 80%; margin-top: 0px; }
            
            .bg-line-art { top: 70px; height: calc(100vh - 70px); opacity: 0.3; } 
            .bg-clef { left: -30px; }
            .bg-sax { right: -30px; }
            
            .site-footer { font-size: 11px; padding: 15px 0; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-area">
            <img src="https://drive.google.com/thumbnail?id=1wTTTIOdEpVF6QKqIOe4IF6bc9ovlCikv&sz=w1000" alt="TYJ Logo">
        </div>
        <nav class="header-links">
            <a href="#">หน้าแรก</a>
            <a href="#">ตารางกิจกรรม</a>
            <a href="#">รายชื่อศิลปิน</a>
            <a href="#">ติดต่อเรา</a>
        </nav>
    </header>

    <main class="hero-section">
        
        <img src="https://drive.google.com/thumbnail?id=1PywfABYVYRgwqHpP6hIFKrtfWoeYxLcd&sz=w1000" alt="Thai Youth Jazz Artwork" class="artwork-image">

        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/I98NphahYjo?rel=0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <img src="https://drive.google.com/thumbnail?id=1CHSf4m6TiUQJs4zukSYYROwdpqSf8xjD&sz=w1000" alt="Thai Youth Jazz Text" class="artwork-text">

    </main>

    <img src="https://drive.google.com/thumbnail?id=1UJ0aNHLuGpgSgx3OQcIKAVXz1Y7M_PBC&sz=w1000" alt="Clef Line Art" class="bg-line-art bg-clef">

    <img src="https://drive.google.com/thumbnail?id=1HvU6mYUNvLenvdMTdiQPzN2zeuZV2j2e&sz=w1000" alt="Saxophone Line Art" class="bg-line-art bg-sax">

    <footer class="site-footer">
        &copy; 2026 Thai Youth Jazz. All Rights Reserved.
    </footer>

</body>
</html>
