<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Youth Jazz | Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Kanit', sans-serif;
            background-color: #000; /* เปลี่ยนสีพื้นหลังเป็นสีดำเพื่อให้วิดีโอเด่นขึ้น */
            overflow-x: hidden;
        }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }

        /* Video Background Layer */
        .video-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .video-container video {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* ปรับ Overlay ให้จางลงเพื่อให้เห็น VDO ชัดๆ แบบ Minimal */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(253, 251, 247, 0.7); /* สีครีมอ่อนๆ จาง 70% */
            z-index: -1;
        }

        /* Navigation Style */
        .nav-blur {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* แอนิเมชั่นเล็กน้อยให้รูป Artwork ลอยไปมาเบาๆ */
        .floating { 
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .btn-jazz {
            background: #0076BE;
            transition: all 0.3s ease;
        }
        .btn-jazz:hover {
            background: #3AB5E5;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="https://drive.google.com/uc?export=download&id=1DbhPrNXIHQY-aVfa4JCX3p_92SS9bWdo" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <nav class="nav-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <img src="https://drive.google.com/thumbnail?id=1gyR1DrbnShdL8q20qTx1Oj_aDXlBoQH3&sz=w1000" alt="TYJ Logo" class="h-10 md:h-12">
            
            <div class="hidden md:flex gap-10 font-montserrat font-extrabold text-[12px] tracking-widest text-slate-600">
                <a href="#" class="hover:text-blue-600">PROGRAM</a>
                <a href="#" class="hover:text-blue-600">ARTISTS</a>
                <a href="#" class="hover:text-blue-600">ABOUT</a>
            </div>

            <button class="font-montserrat font-extrabold text-xs text-white px-6 py-2.5 rounded-full btn-jazz shadow-lg">
                TICKETS
            </button>
        </div>
    </nav>

    <main class="relative z-10 flex flex-col items-center justify-center min-h-[80vh] px-6 text-center">
        
        <div class="floating max-w-[500px] w-full mb-8">
            <img src="LINK_IMAGE_ARTWORK_ใหม่_แบบโปร่งใส" 
                 alt="Thai Youth Jazz Artwork" 
                 class="w-full h-auto drop-shadow-2xl">
        </div>

        <div class="max-w-2xl">
            <p class="font-montserrat font-extrabold text-slate-400 tracking-[0.5em] text-[10px] mb-4 uppercase">Bangkok 2024 - A New Era of Jazz</p>
            <h2 class="text-slate-800 text-lg md:text-xl font-light mb-10 tracking-wide">
                พลังสร้างสรรค์ดนตรีแจ๊สจากเยาวชนรุ่นใหม่ <br class="hidden md:block">
                สัมผัสประสบการณ์ทางดนตรีที่ไร้ขีดจำกัด
            </h2>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center font-montserrat relative z-10">
                <a href="#" class="border-2 border-slate-800 text-slate-800 px-10 py-3 rounded-xl font-extrabold hover:bg-slate-800 hover:text-white transition text-center">
                    VIEW SCHEDULE
                </a>
            </div>
        </div>
    </main>

    <footer class="relative z-10 py-10 flex flex-col items-center gap-6 footer-opacity">
        <div class="flex gap-8 grayscale hover:grayscale-0 transition duration-500">
            <a href="#" class="text-xl">FB</a>
            <a href="#" class="text-xl">IG</a>
            <a href="#" class="text-xl">TT</a>
        </div>
        <p class="font-montserrat font-extrabold text-[9px] tracking-[0.6em] text-slate-400 uppercase">
            © 2024 Thai Youth Jazz All Rights Reserved.
        </p>
    </footer>

</body>
</html>
