<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Youth Jazz (TYJ) - โครงการส่งเสริมเยาวชนด้านดนตรี</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Kanit', sans-serif;
            overflow-x: hidden;
            color: #333333;
        }

        /* 1. Header (Fixed Top) */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px; 
            padding: 0 40px;
            display: flex;
            align-items: center;
            z-index: 2000; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo-area img { height: 50px; display: block; }
        .header-links { margin-left: 50px; display: flex; gap: 25px; }
        .header-links a { text-decoration: none; color: #444444; font-size: 15px; font-weight: 500; }

        /* 2. BACKGROUND LAYER (Fixed Artwork) */
        .fixed-background-layer {
            position: fixed;
            top: 80px; /* ต่อจาก Header */
            left: 0;
            width: 100%;
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            justify-content: center; /* จัดกึ่งกลางแนวตั้ง */
            align-items: center;
            z-index: 1; 
            pointer-events: none; 
            padding: 20px;
            box-sizing: border-box;
        }

        /* การตั้งค่าสำหรับ MacBook / Desktop ทั่วไป */
        .artwork-image {
            width: auto;
            max-width: 90%;
            height: auto;
            max-height: 60vh; /* สูงไม่เกิน 60% ของจอ */
            object-fit: contain;
            margin-bottom: -20px;
            animation: floatBobbing 5s ease-in-out infinite;
            filter: drop-shadow(0px 15px 30px rgba(0,0,0,0.1));
        }

        .artwork-text {
            width: auto;
            max-width: 80%;
            height: auto;
            max-height: 15vh; /* ตัวอักษรสูงไม่เกิน 15% ของจอ */
            object-fit: contain;
        }

        @keyframes floatBobbing {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* ลายเส้นประกอบ */
        .bg-line-art {
            position: fixed;
            top: 80px;
            height: calc(100vh - 80px);
            z-index: 0; 
            pointer-events: none;
            opacity: 0.8;
            object-fit: contain;
        }
        .bg-clef { left: -30px; }
        .bg-sax { right: -30px; }

        /* 3. SCROLLING LAYER */
        .scrolling-content-layer {
            position: relative;
            z-index: 10; 
            margin-top: 100vh; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px); 
            -webkit-backdrop-filter: blur(5px);
            width: 100%;
            padding: 80px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-wrapper {
            width: 100%;
            max-width: 850px; 
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            background-color: #000;
        }
        .video-wrapper iframe { width: 100%; height: 100%; border: none; }

        /* 📱 สำหรับแท็บเล็ต / iPad (768px - 1024px) */
        @media (min-width: 769px) and (max-width: 1024px) {
            .artwork-image { max-height: 55vh; max-width: 95%; }
            .artwork-text { max-height: 12vh; max-width: 85%; }
            .bg-line-art { opacity: 0.3; }
        }

        /* 📱 สำหรับมือถือ (ต่ำกว่า 768px) */
        @media (max-width: 768px) {
            .top-bar { 
                height: auto; 
                padding: 15px; 
                flex-direction: column; 
                gap: 10px;
            }
            .logo-area img { height: 40px; }
            .header-links { margin-left: 0; gap: 15px; }
            .header-links a { font-size: 14px; }
            
            .fixed-background-layer { 
                top: 90px; 
                justify-content: flex-start; /* มือถือให้เริ่มจากด้านบน */
                padding-top: 20px; 
            }
            .artwork-image { 
                max-height: none; 
                width: 100%; 
                max-width: 100%; 
                margin-bottom: -10px; 
            } 
            .artwork-text { 
                max-height: none; 
                width: 90%; 
            }
            
            .bg-line-art { opacity: 0.15; }
            .scrolling-content-layer { margin-top: 75vh; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-area">
            <img src="https://drive.google.com/thumbnail?id=1xHurMGkukvAQUgRI1mrY2X0maJ2AYFeo&sz=w1000" alt="TYJ Logo">
        </div>
        <nav class="header-links">
            <a href="#">หน้าแรก</a>
            <a href="#">ตารางกิจกรรม</a>
            <a href="#">รายชื่อศิลปิน</a>
            <a href="#">ติดต่อเรา</a>
        </nav>
    </header>

    <div class="fixed-background-layer">
        <img src="https://drive.google.com/thumbnail?id=1-5rm2ylaRCW2NgmL8LctnDH-Bezs_IpX&sz=w1000" class="artwork-image">
        <img src="https://drive.google.com/thumbnail?id=1CHSf4m6TiUQJs4zukSYYROwdpqSf8xjD&sz=w1000" class="artwork-text">
    </div>

    <img src="https://drive.google.com/thumbnail?id=1UJ0aNHLuGpgSgx3OQcIKAVXz1Y7M_PBC&sz=w1000" class="bg-line-art bg-clef">
    <img src="https://drive.google.com/thumbnail?id=1HvU6mYUNvLenvdMTdiQPzN2zeuZV2j2e&sz=w1000" class="bg-line-art bg-sax">

    <main class="scrolling-content-layer">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/I98NphahYjo?rel=0" allowfullscreen></iframe>
        </div>
    </main>

</body>
</html>
