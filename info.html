<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYJ - เกี่ยวกับเรา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Kanit', sans-serif;
            overflow-x: hidden;
            color: #333333;
        }

        /* 1. Header (Fixed Top) */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 85px; 
            padding: 0 40px;
            display: flex;
            align-items: center;
            z-index: 2000; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo-area img { height: 55px; display: block; }
        .header-links { margin-left: 50px; display: flex; gap: 30px; }
        .header-links a { text-decoration: none; color: #444444; font-size: 16px; font-weight: 500; transition: color 0.3s; }
        .header-links a:hover, .header-links a.active { color: #F26522; }

        /* 2. BACKGROUND LAYER (Fixed Artwork) */
        .fixed-background-layer {
            position: fixed;
            top: 85px; 
            left: 0;
            width: 100%;
            height: calc(100vh - 85px);
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            z-index: 1; 
            pointer-events: none; 
            text-align: center;
            padding: 10px 10px 50px 10px; 
            box-sizing: border-box;
        }

        .artwork-image {
            width: 100%; 
            max-width: 1250px; 
            max-height: 70vh;  
            object-fit: contain; 
            margin-bottom: 10px; 
            animation: floatBobbing 5s ease-in-out infinite;
            filter: drop-shadow(0px 15px 30px rgba(0,0,0,0.1));
        }

        @keyframes floatBobbing {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* 3. SCROLLING LAYER */
        .scrolling-content-layer {
            position: relative;
            z-index: 10; 
            margin-top: 100vh; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255, 255, 255, 0.4); 
            width: 100%;
            padding: 80px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08); 
        }

        .info-card {
            background: rgba(255, 255, 255, 0.9);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
        }
        .info-card h2 { color: #F26522; margin-top: 0; }

        .site-footer {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            text-align: center;
            padding: 30px 0;
            color: #666666;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .top-bar { height: auto; padding: 15px 10px; flex-direction: column; gap: 12px; }
            .header-links { margin-left: 0; gap: 15px; }
            .fixed-background-layer { top: 95px; justify-content: flex-start; padding-top: 25px; }
            .artwork-image { width: 100%; max-height: 50vh; }
            .scrolling-content-layer { margin-top: 75vh; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-area">
            <img src="https://drive.google.com/thumbnail?id=1xHurMGkukvAQUgRI1mrY2X0maJ2AYFeo&sz=w1000" alt="TYJ Logo">
        </div>
        <nav class="header-links">
            <a href="index.html">หน้าแรก</a>
            <a href="schedule.html">ตารางกิจกรรม</a>
            <a href="musicians.html">รายชื่อศิลปิน</a>
            <a href="info.html" class="active">ติดต่อเรา</a>
        </nav>
    </header>

    <div class="fixed-background-layer">
        <img src="https://drive.google.com/thumbnail?id=1BqhsgImFkHZvZaqb89eyK1bwdV5RgfHA&sz=w1000" class="artwork-image">
    </div>

    <main class="scrolling-content-layer">
        <div class="info-card">
            <h2>ข้อมูลเพิ่มเติมและการติดต่อ</h2>
            <p>ข้อมูลโครงการ หรือช่องทางการติดต่อสอบถาม</p>
        </div>
        <footer class="site-footer">
            &copy; 2026 Thai Youth Jazz. All Rights Reserved.
        </footer>
    </main>

</body>
</html>
